<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <h1>Expense &amp; Budget Visualizer</h1>

  <!-- Balance -->
  <div class="card balance-card">
    <p class="balance-label">TOTAL BALANCE</p>
    <p class="balance-amount" id="totalBalance">$0.00</p>
  </div>

  <!-- Form -->
  <div class="card">
    <h2>Add Transaction</h2>
    <form id="transactionForm">
      <label for="itemName">Item Name</label>
      <input type="text" id="itemName" placeholder="e.g. Coffee" />

      <label for="amount">Amount</label>
      <input type="number" id="amount" placeholder="e.g. 15000" min="1" step="1" />

      <label for="category">Category</label>
      <select id="category">
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Fun">Fun</option>
      </select>

      <button type="submit">Add Transaction</button>
    </form>
  </div>

  <!-- List + Chart -->
  <div class="bottom-grid">
    <div class="card">
      <h2>Transactions</h2>
      <ul id="transactionList"></ul>
      <p id="emptyMsg" class="empty-msg">No transactions yet.</p>
    </div>

    <div class="card chart-card">
      <h2>Spending by Category</h2>
      <canvas id="spendingChart"></canvas>
      <p id="chartEmpty" class="empty-msg">Add transactions to see the chart.</p>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
